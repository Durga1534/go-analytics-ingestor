version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: go-analytics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics

  postgres:
    image: postgres:16-alpine
    container_name: go-analytics-postgres
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-analytics-app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://analytics:analytics_password@postgres:5432/analytics_db?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - analytics

volumes:
  redis_data:
  postgres_data:

networks:
  analytics:
    driver: bridge
